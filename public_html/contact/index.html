<script>
    // FUNCTION FOR SCROLLING ON DIV
    $(document).ready(function () {
var scrolling = function scrolling() {
    // Handler for .ready() called.
    $('html, body').animate({
        scrollTop: $('.cont-container').offset().top
    }, 'slow');
};
//after 3000 milliseconds (=3 seconds), call the hideOverlay function
window.setTimeout(scrolling, 1000);
});
</script>
   


<script>
$(document).ready(function () {

'use strict';

var c, currentScrollTop = 0,
   navbar = $('.navbar');

$(window).scroll(function () {
  var a = $(window).scrollTop();
  var b = navbar.height();
 
  currentScrollTop = a;
 
  if (c < currentScrollTop && a > b + b || a == 0) {
    navbar.removeClass("hideonLoad");
    navbar.addClass("scrollUp");
  } else if (c > currentScrollTop && !(a <= b)) {
    navbar.removeClass("scrollUp");
  }
  c = currentScrollTop;
});

});
  </script>
